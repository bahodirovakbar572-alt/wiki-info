<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: #1a1a1a;
        transition: all 0.3s ease;
        min-height: 100vh;
    }

    body.dark-mode {
        background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
        color: #e0e0e0;
    }

    .first-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        position: relative;
    }

    .toggle-btn {
        position: fixed;
        top: 30px;
        right: 30px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        z-index: 999;
    }

    body.dark-mode .toggle-btn {
        background: rgba(30, 30, 30, 0.95);
    }

    .toggle-btn:hover {
        transform: scale(1.15);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    .toggle-btn:active {
        transform: scale(0.95);
    }

    h1 {
        font-size: 3.5em;
        font-weight: 700;
        letter-spacing: -2px;
        margin-bottom: 50px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    body.dark-mode h1 {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .search-wrapper {
        position: relative;
        width: 100%;
        max-width: 550px;
    }

    #searchInput {
        width: 100%;
        padding: 16px 24px;
        font-size: 1em;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        color: #1a1a1a;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    body.dark-mode #searchInput {
        background: rgba(40, 40, 40, 0.95);
        color: #e0e0e0;
    }

    #searchInput:focus {
        outline: none;
        box-shadow: 0 6px 25px rgba(102, 126, 234, 0.3);
        transform: translateY(-2px);
    }

    #searchInput::placeholder {
        color: #999;
    }

    body.dark-mode #searchInput::placeholder {
        color: #666;
    }

    #searchResults {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgba(255, 255, 255, 0.98);
        border-radius: 12px;
        margin-top: 10px;
        max-height: 400px;
        overflow-y: auto;
        z-index: 1000;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        backdrop-filter: blur(10px);
    }

    body.dark-mode #searchResults {
        background: rgba(30, 30, 30, 0.98);
    }

    #searchResults > div {
        padding: 14px 20px;
        cursor: pointer;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        transition: all 0.2s ease;
        color: #1a1a1a;
    }

    body.dark-mode #searchResults > div {
        border-bottom-color: rgba(255, 255, 255, 0.1);
        color: #e0e0e0;
    }

    #searchResults > div:hover {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        padding-left: 24px;
    }

    #searchResults > div:last-child {
        border-bottom: none;
    }

</style>
<body>

    <button class="toggle-btn" id="themeToggle">🌙</button>

    <section class="first-page">
        <h1>Wiki</h1>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search Wikipedia...">
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
